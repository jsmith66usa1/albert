<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Einstein's Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Fira+Code&display=swap" rel="stylesheet">
    <script>
      window.MathJax = {
        tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
        svg: { fontCache: 'global' }
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --bg-color: #0c0c0e;
            --text-color: #ffffff;
            --glass-bg: rgba(20, 20, 23, 0.98);
            --border-color: rgba(255, 255, 255, 0.12);
            --chat-einstein-bg: #18181b;
            --chat-user-bg: #6366f1;
            --input-bg: #09090b;
            --aside-bg: #050505;
            --accent: #6366f1;
            --header-h: 70px;
            --footer-h: 120px;
        }

        body.light-mode {
            --bg-color: #fbf9f4;
            --text-color: #1a1a1e;
            --glass-bg: rgba(255, 255, 255, 0.96);
            --border-color: rgba(0, 0, 0, 0.1);
            --chat-einstein-bg: #ffffff;
            --chat-user-bg: #4f46e5;
            --input-bg: #f3f3f5;
            --aside-bg: #f7f3ed;
            --accent: #4f46e5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #root { height: 100vh; width: 100vw; display: flex; flex-direction: column; }

        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .justify-between { justify-content: space-between; }
        .flex-1 { flex: 1; min-height: 0; }
        .w-full { width: 100%; }
        .h-full { height: 100%; }
        .relative { position: relative; }
        .absolute { position: absolute; }
        .z-50 { z-index: 50; }

        .header {
            height: var(--header-h);
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding: 0 1.5rem;
        }

        .footer {
            height: var(--footer-h);
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-color);
            padding: 1rem;
        }

        .main-content {
            height: calc(100vh - var(--header-h) - var(--footer-h));
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* iPad and Tablet optimization: Side-by-side view */
        @media (min-width: 768px) {
            .main-content { flex-direction: row; }
            .chat-sidebar { width: 50% !important; border-right: 1px solid var(--border-color); }
            .chalkboard-area { width: 50% !important; }
        }

        .chat-sidebar {
            background: var(--aside-bg);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .chalkboard-area {
            background: var(--aside-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            width: 100%;
            height: 100%;
        }

        .bg-einstein { background-color: var(--chat-einstein-bg); border: 1px solid var(--border-color); }
        .bg-user { background-color: var(--chat-user-bg); color: #fff; }

        .chalkboard-filter {
            filter: sepia(0.2) contrast(1.1) brightness(0.9);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border-radius: 1.5rem;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            aspect-ratio: 1/1;
        }

        .msg-container {
            max-width: 95%;
            padding: 1.25rem;
            border-radius: 1.25rem;
            margin-bottom: 1rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            word-wrap: break-word;
        }

        button {
            cursor: pointer;
            border: 1px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-color);
            border-radius: 0.75rem;
            padding: 0.5rem 1rem;
            font-weight: 700;
        }
        button:hover { background: var(--accent); color: white; }

        input {
            border: 1px solid var(--border-color);
            color: var(--text-color);
            background: var(--input-bg);
            width: 100%;
            padding: 0.8rem 1.2rem;
            border-radius: 1.25rem;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(128, 128, 128, 0.3); border-radius: 10px; }
        .no-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        .serif { font-family: 'Playfair Display', serif; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle var(--duration) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; } }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "firebase/app": "https://esm.sh/firebase@^10.8.0/app",
    "firebase/database": "https://esm.sh/firebase@^10.8.0/database",
    "firebase/": "https://esm.sh/firebase@^12.8.0/"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
</body>
</html>
