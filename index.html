
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Einstein's Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Fira+Code&display=swap" rel="stylesheet">
    <script>
      window.MathJax = {
        tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
        svg: { fontCache: 'global' }
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --bg-color: #0c0c0e;
            --text-color: #ffffff;
            --glass-bg: rgba(20, 20, 23, 0.98);
            --border-color: rgba(255, 255, 255, 0.12);
            --chat-einstein-bg: #18181b;
            --chat-user-bg: #6366f1;
            --input-bg: #09090b;
            --aside-bg: #050505;
            --accent: #6366f1;
            --header-h: 70px;
            --footer-h: auto;
            --font-size-base: 1rem;
        }

        body.light-mode {
            --bg-color: #fbf9f4;
            --text-color: #1a1a1e;
            --glass-bg: rgba(255, 255, 255, 0.96);
            --border-color: rgba(0, 0, 0, 0.1);
            --chat-einstein-bg: #ffffff;
            --chat-user-bg: #4f46e5;
            --input-bg: #f3f3f5;
            --aside-bg: #f7f3ed;
            --accent: #4f46e5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            height: -webkit-fill-available;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            font-size: var(--font-size-base);
        }

        #root { height: 100%; width: 100vw; display: flex; flex-direction: column; }

        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .justify-between { justify-content: space-between; }
        .flex-1 { flex: 1; min-height: 0; }
        .w-full { width: 100%; }
        .h-full { height: 100%; }
        .relative { position: relative; }
        .absolute { position: absolute; }
        .z-50 { z-index: 50; }

        .header {
            height: var(--header-h);
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding: 0 1rem;
            flex-shrink: 0;
        }
        @media (min-width: 1024px) {
            .header { padding: 0 2rem; height: 80px; }
        }

        .footer {
            min-height: 100px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-color);
            padding: 0.75rem;
            flex-shrink: 0;
            padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
        }
        @media (min-width: 1024px) {
            .footer { padding: 1.5rem; height: 140px; }
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        @media (min-width: 1024px) {
            .main-content {
                flex-direction: row;
            }
        }

        .chat-sidebar {
            background: var(--aside-bg);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 50%;
            border-bottom: 1px solid var(--border-color);
        }
        @media (min-width: 1024px) {
            .chat-sidebar {
                width: 40%;
                height: 100%;
                border-bottom: none;
                border-right: 1px solid var(--border-color);
            }
        }

        .chalkboard-area {
            background: var(--aside-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem;
            width: 100%;
            height: 50%;
            overflow: hidden;
        }
        @media (min-width: 1024px) {
            .chalkboard-area {
                width: 60%;
                height: 100%;
                padding: 2.5rem;
            }
        }

        .bg-einstein { background-color: var(--chat-einstein-bg); border: 1px solid var(--border-color); }
        .bg-user { background-color: var(--chat-user-bg); color: #fff; }

        .chalkboard-filter {
            filter: sepia(0.2) contrast(1.1) brightness(0.9);
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            border-radius: 1.2rem;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            aspect-ratio: 1/1;
            border: 4px solid #27272a;
        }

        .msg-container {
            max-width: 90%;
            padding: 1rem;
            border-radius: 1.2rem;
            margin-bottom: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            word-wrap: break-word;
            line-height: 1.5;
        }
        @media (min-width: 1024px) {
            .msg-container { max-width: 85%; padding: 1.5rem; border-radius: 1.5rem; }
        }

        button {
            cursor: pointer;
            border: 1px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-color);
            border-radius: 0.75rem;
            padding: 0.5rem 1rem;
            font-weight: 700;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }
        @media (min-width: 1024px) {
            button { padding: 0.75rem 1.5rem; font-size: 1rem; border-radius: 1rem; }
        }
        button:hover { background: var(--accent); color: white; transform: translateY(-1px); }
        button:active { transform: translateY(0); }

        input {
            border: 1px solid var(--border-color);
            color: var(--text-color);
            background: var(--input-bg);
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            font-size: 1rem;
        }
        @media (min-width: 1024px) {
            input { padding: 1.2rem 1.5rem; font-size: 1.1rem; border-radius: 1.5rem; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(128, 128, 128, 0.3); border-radius: 10px; }
        .no-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        .serif { font-family: 'Playfair Display', serif; }
        
        .welcome-screen {
            position: fixed;
            inset: 0;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            padding: 0;
            margin: 0;
        }

        .welcome-btn {
            width: 100vw;
            height: 100vh;
            background: transparent;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            padding: 2rem;
            text-align: center;
            transition: background 0.5s ease;
        }

        .welcome-btn:hover {
            background: rgba(99, 102, 241, 0.05);
        }

        .welcome-btn h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 900;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
        }

        .welcome-btn p {
            font-size: clamp(1rem, 3vw, 1.5rem);
            opacity: 0.7;
            max-width: 600px;
            line-height: 1.6;
        }

        .welcome-btn .cta {
            margin-top: 4rem;
            font-size: 1rem;
            font-weight: 900;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            padding: 1.25rem 2.5rem;
            border: 2px solid white;
            border-radius: 3rem;
        }
        @media (min-width: 1024px) {
            .welcome-btn .cta { font-size: 1.2rem; padding: 1.5rem 3rem; }
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "firebase/app": "https://esm.sh/firebase@^10.8.0/app",
    "firebase/database": "https://esm.sh/firebase@^10.8.0/database",
    "firebase/": "https://esm.sh/firebase@^12.8.0/"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
</body>
</html>
