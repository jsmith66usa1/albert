
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einstein's Universe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Fira+Code&display=swap" rel="stylesheet">
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']]
        },
        svg: {
          fontCache: 'global'
        }
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --bg-color: #0c0c0e;
            --text-color: #f8fafc;
            --glass-bg: rgba(24, 24, 27, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --chat-einstein-bg: rgba(24, 24, 27, 0.8);
            --input-bg: rgba(24, 24, 27, 0.5);
            --aside-bg: rgba(12, 12, 14, 0.6);
            --accent: #6366f1;
        }

        body.light-mode {
            --bg-color: #fcfaf7;
            --text-color: #1c1917;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --border-color: rgba(0, 0, 0, 0.08);
            --chat-einstein-bg: rgba(255, 255, 255, 0.9);
            --input-bg: rgba(255, 255, 255, 0.6);
            --aside-bg: rgba(245, 245, 244, 0.7);
            --accent: #4f46e5;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .serif { font-family: 'Playfair Display', serif; }
        .mono { font-family: 'Fira Code', monospace; }
        
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
        }

        .border-theme { border-color: var(--border-color); }
        .bg-einstein { background-color: var(--chat-einstein-bg); }
        .bg-input { background-color: var(--input-bg); }
        .bg-aside { background-color: var(--aside-bg); }

        .chalkboard-filter {
            filter: sepia(0.2) contrast(1.1) brightness(0.9);
            box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
        }

        body.light-mode .chalkboard-filter {
            filter: sepia(0.05) contrast(1.05) brightness(1);
        }

        /* Era indicator animation */
        .era-active-glow {
            box-shadow: 0 0 15px var(--accent);
        }

        /* MathJax Override for light mode */
        body.light-mode mjx-container {
            color: #1c1917 !important;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(128, 128, 128, 0.3);
            border-radius: 10px;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes twinkle {
          0%, 100% { opacity: 0.3; }
          50% { opacity: 0.8; }
        }
        .star {
          position: absolute;
          background: white;
          border-radius: 50%;
          animation: twinkle var(--duration) infinite ease-in-out;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
</body>
</html>
